apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: ashu72/frontend:v1

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
          limits:
            cpu: "200m"
